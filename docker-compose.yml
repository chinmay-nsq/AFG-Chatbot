services:
  afg_postgres:
    image: postgres:16
    container_name: afg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    volumes:
      - afg_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - afg_net

  afg_chatbot:
    build: .
    container_name: afg_chatbot
    restart: unless-stopped
    env_file: .env
    depends_on:
      - afg_postgres
    ports:
      - "127.0.0.1:5050:5050"
    networks:
      - afg_net

networks:
  afg_net:
    driver: bridge

volumes:
  afg_pgdata:
